name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs obsoletas do mesmo branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: python · lint + type-check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras --group dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov=ingestion --cov=api --cov-report=term-missing

  web:
    name: web · lint + type-check + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm nuxi prepare

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  openapi-drift:
    name: openapi · types drift check
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync --extra api --group dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check drift
        run: bash scripts/generate-api-types.sh --check
