name: load-tests

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # toda segunda-feira às 6h UTC
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run"
        required: true
        default: smoke
        type: choice
        options: [smoke, load, stress]
      base_url:
        description: "API base URL"
        required: false
        default: "http://localhost:8000"

permissions:
  contents: read

jobs:
  load-test:
    name: k6 · ${{ inputs.scenario || 'smoke' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install 3.12
      - run: uv sync --all-extras --group dev

      - name: start api server (smoke/load against localhost)
        if: ${{ !inputs.base_url || inputs.base_url == 'http://localhost:8000' }}
        run: |
          uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 4
        env:
          DATABASE_URL: ""
          BLIZZARD_CLIENT_ID: test
          BLIZZARD_CLIENT_SECRET: test

      - uses: grafana/setup-k6-action@v1

      - name: run k6
        run: |
          k6 run \
            --out json=results/k6-results.json \
            -e BASE_URL=${{ inputs.base_url || 'http://localhost:8000' }} \
            k6/scenarios/${{ inputs.scenario || 'smoke' }}.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ inputs.scenario || 'smoke' }}
          path: results/k6-results.json
