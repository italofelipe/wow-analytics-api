name: snapshot

on:
  schedule:
    - cron: "0 3,15 * * *"        # 2x/dia
  workflow_dispatch:
    inputs:
      limit:
        description: "quantidade máxima de chars processados"
        required: false
        default: "500"

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
      BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
      BLIZZARD_REGIONS: ${{ vars.BLIZZARD_REGIONS || 'us,eu' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ vars.R2_BUCKET || 'wow-analytics-raw' }}
      SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
      SENTRY_ENVIRONMENT: production
      LOG_FORMAT: json
      INGEST_SNAPSHOT_LIMIT: ${{ inputs.limit || '500' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - run: uv sync --extra ingestion
      - run: uv run python -m ingestion.pipelines.run_snapshot
