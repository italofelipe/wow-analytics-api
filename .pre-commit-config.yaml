default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^web/types/api\.d\.ts$
      - id: end-of-file-fixer
        exclude: ^web/types/api\.d\.ts$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.8
          - pydantic-settings>=2.4
          - structlog>=24.4
          - types-python-dateutil
        args: ["--config-file=mypy.ini"]
        # Só checa código em ingestion/ e api/ (exclui tests/ + web/ + supabase/).
        files: ^(ingestion|api)/(?!.*tests/).*\.py$

  # Hook local pra prettier + eslint em web/ — roda direto via pnpm pra não
  # duplicar config entre pre-commit e o CI do Nuxt.
  - repo: local
    hooks:
      - id: web-lint
        name: web-lint (eslint + prettier em arquivos web/)
        language: system
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|vue|js|mjs|cjs|json|md)$
        entry: bash -c "cd web && pnpm lint"

      - id: openapi-types-drift
        name: openapi-types-drift (web/types/api.d.ts sincronizado)
        language: system
        pass_filenames: false
        # Só roda quando o schema pode ter mudado.
        files: ^(api/.*\.py|web/types/api\.d\.ts)$
        entry: bash scripts/generate-api-types.sh --check
        stages: [manual]
