[mypy]
python_version = 3.12
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_decorators = true
pretty = true
show_error_codes = true
show_column_numbers = true
# Pacotes locais
packages = ingestion,api
exclude = (?x)(
    ^web/
    | ^supabase/
    | ^\.venv/
    | /tests/
  )

# Libs sem stubs públicos — evita bloquear boot. Cada entry é um compromisso:
# ao subir versão, checar se já publicaram stubs e remover o ignore.
[mypy-aioboto3.*]
ignore_missing_imports = true

[mypy-botocore.*]
ignore_missing_imports = true

[mypy-respx.*]
ignore_missing_imports = true
