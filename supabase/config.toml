# Supabase CLI config — commitado. Valores específicos do ambiente ficam em `.env`.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "wow-analytics"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false
site_url = "http://localhost:3000"

[analytics]
enabled = false
